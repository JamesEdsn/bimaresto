info:
  name: Process Item Payment
  type: http
  seq: 13

http:
  method: POST
  url: "{{base_url}}/payments/items"
  body:
    type: json
    data: |-
      {
        "order_id": 1,
        "item_ids": [1],
        "payment_method": "qris"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5