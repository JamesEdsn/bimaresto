info:
  name: Create Category
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/categories"
  body:
    type: json
    data: |-
      {
        "name": "Minuman"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 201 || res.getStatus() === 200) {
          const data = res.getBody().data;
          if (data && data.id) {
            bru.setEnvVar('last_category_id', data.id);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5