info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/login"
  body:
    type: json
    data: |-
      {
        "full_name": "Super Admin",
        "password": "admin123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const data = res.getBody().data;
          bru.setEnvVar("token", data.access_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
